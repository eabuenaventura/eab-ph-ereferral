name: ConceptMap
description: Create or update a FHIR ConceptMap
title: "[ConceptMap] "
labels: ["terminology", "ig-artifact"]
body:
  - type: markdown
    attributes:
      value: |
        ## ConceptMap Definition-of-Done
        Reference: [Definition-of-Done per Artifact](https://fhirpatterns.net/fhir-authoring-patterns/patterns/pl-05/)
        
  - type: input
    id: conceptmap_name
    attributes:
      label: ConceptMap Name
      description: Name of the ConceptMap
      placeholder: "PeRefStatusToTaskStatus"
    validations:
      required: true
      
  - type: input
    id: source_valueset
    attributes:
      label: Source ValueSet/System
      description: Source terminology
      placeholder: "PeRefReferralStatus"
    validations:
      required: true
      
  - type: input
    id: target_valueset
    attributes:
      label: Target ValueSet/System
      description: Target terminology
      placeholder: "http://hl7.org/fhir/task-status"
    validations:
      required: true
      
  - type: textarea
    id: purpose
    attributes:
      label: Purpose
      description: Why is this mapping needed?
      placeholder: "Map local referral status codes to FHIR Task status for interoperability"
    validations:
      required: true
      
  - type: checkboxes
    id: dod_checklist
    attributes:
      label: Definition-of-Done Checklist
      description: Complete before marking as done
      options:
        - label: Purpose/intent documented
          required: true
        - label: All mappings defined with equivalence
          required: true
        - label: Test cases provided (sample translations)
          required: true
        - label: ConceptMap validates in IG build
          required: true
        - label: Reviewed by terminology expert
          required: true
        - label: Linked to relevant profiles/use cases
          required: true
          
  - type: dropdown
    id: sprint
    attributes:
      label: Target Sprint
      options:
        - Sprint 0
        - Sprint 1
        - Sprint 2
        - Sprint 3
        - Sprint 4
        - Sprint 5
        - Sprint 6
    validations:
      required: true
