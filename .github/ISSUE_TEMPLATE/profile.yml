name: Profile
description: Create or update a FHIR profile
title: "[Profile] "
labels: ["profile", "ig-artifact"]
body:
  - type: markdown
    attributes:
      value: |
        ## Profile Definition-of-Done
        Reference: [Definition-of-Done per Artifact](https://fhirpatterns.net/fhir-authoring-patterns/patterns/pl-05/)
        
  - type: input
    id: profile_name
    attributes:
      label: Profile Name
      description: Name of the profile (e.g., PeRefServiceRequest)
      placeholder: "PeRefServiceRequest"
    validations:
      required: true
      
  - type: input
    id: base_resource
    attributes:
      label: Base Resource
      description: FHIR resource being profiled
      placeholder: "ServiceRequest"
    validations:
      required: true
      
  - type: textarea
    id: purpose
    attributes:
      label: Purpose
      description: Clinical/business purpose of this profile
      placeholder: "Describe why this profile is needed and what problem it solves"
    validations:
      required: true
      
  - type: textarea
    id: constraints
    attributes:
      label: Key Constraints
      description: List main constraints (cardinality, must-support, bindings)
      placeholder: |
        - status: required
        - code: bound to PeRefServiceType
        - subject: must-support
    validations:
      required: true
      
  - type: checkboxes
    id: dod_checklist
    attributes:
      label: Definition-of-Done Checklist
      description: Complete before marking as done
      options:
        - label: Profile validates in IG build
          required: true
        - label: At least one valid example exists
          required: true
        - label: Narrative description added to profile
          required: true
        - label: All must-support elements justified
          required: true
        - label: Terminology bindings defined and validated
          required: true
        - label: Linked to use case / workflow
          required: true
          
  - type: dropdown
    id: sprint
    attributes:
      label: Target Sprint
      options:
        - Sprint 0
        - Sprint 1
        - Sprint 2
        - Sprint 3
        - Sprint 4
        - Sprint 5
        - Sprint 6
    validations:
      required: true
