name: CI/Build Infrastructure
description: CI pipeline, build configuration, or automation task
title: "[CI] "
labels: ["ci", "infrastructure"]
body:
  - type: markdown
    attributes:
      value: |
        ## CI/Build Definition-of-Done
        Reference: [Definition-of-Done per Artifact](https://fhirpatterns.net/fhir-authoring-patterns/patterns/pl-05/)
        
        Sprint 0 requires: IG repo + CI skeleton builds successfully
        
  - type: input
    id: task_name
    attributes:
      label: Task Name
      description: Name of the CI/build task
      placeholder: "Setup GitHub Actions IG Publisher"
    validations:
      required: true
      
  - type: dropdown
    id: task_type
    attributes:
      label: Task Type
      options:
        - CI Pipeline Setup
        - Build Configuration
        - Validation Gate
        - Automated Testing
        - Deployment/Publishing
        - Other
    validations:
      required: true
      
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What needs to be implemented or fixed?
      placeholder: "Configure GitHub Actions to run IG Publisher on every PR"
    validations:
      required: true
      
  - type: checkboxes
    id: dod_checklist
    attributes:
      label: Definition-of-Done Checklist
      description: Complete before marking as done
      options:
        - label: CI pipeline runs successfully
          required: true
        - label: Build produces valid IG output
          required: true
        - label: Validation errors fail the build
          required: true
        - label: Build artifacts are accessible
          required: true
        - label: Documentation updated (README/wiki)
          required: true
        - label: Tested on sample IG content
          required: true
          
  - type: dropdown
    id: sprint
    attributes:
      label: Target Sprint
      options:
        - Sprint 0
        - Sprint 1
        - Sprint 2
        - Sprint 3
        - Sprint 4
        - Sprint 5
        - Sprint 6
    validations:
      required: true
